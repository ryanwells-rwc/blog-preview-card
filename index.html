<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport"
	      content="width=device-width, initial-scale=1.0, user-scalable=yes">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<link rel="stylesheet" href="style.css">
	<link rel="icon" href="./assets/images/favicon-32x32.png" type="image/png">
	<title>Blog Preview Card</title>
</head>
<body>
<main>
	<div class="card">
		<img class="article-img" src="./assets/images/illustration-article.svg" alt="Article Illustration">
		<button class="text-preset-3 bold" type="button">Learning</button>
		<p class="pub-date text-preset-3">Published 21 Dec 2023</p>
		<h1 class="text-preset-1 mb-12">HTML & CSS Foundations</h1>
		<p class="text-preset-2 mb-24">
			These languages are the backbone of every website, defining structure, content, and presentation.
		</p>
		<div class="author-container">
			<img src="./assets/images/image-avatar.webp" alt="Author Avatar">
			<p class="text-preset-3 bold ml-12">Greg Hooper</p>
		</div>
	</div>
</main>
<div class="attribution">
	Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener noreferrer">Frontend Mentor</a>.
	Coded by <a href="https://ryanwells.io">Ryan Wells</a>.
</div>
</body>
</html>
